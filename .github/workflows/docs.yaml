name: Build documentation

on:
  push:
    branches:
    - main
  workflow_dispatch:

  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v7

      - id: install-uv
        name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.29"
          enable-cache: true
      
      - id: install-python
        name: Install Python
        run: uv python install 3.13
      - id: install-python-dependencies
        name: Install Python dependencies
        run: uv sync --all-groups --locked
        shell: bash

      - id: build-sphinx-documentation
        name: Build Sphinx documentation
        run: uv run sphinx-build -b html ./docs _build
        shell: bash

      - id: upload-release-candidate
        name: Upload release candidate
        uses: actions/upload-artifact@v7
        with:
          name: release-candidate
          path: _build/

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.ref_name == 'main' }}
    steps:
      - name: Download release candidate
        uses: actions/download-artifact@v8
        with:
          name: release-candidate
          path: ./docs/

      - id: configure-aws
        name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.PALEWIRE_DOCS_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PALEWIRE_DOCS_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - id: upload-to-s3
        name: Upload documentation to Amazon S3
        uses: datadesk/delivery-deploy-action@v1
        with:
          bucket: ${{ secrets.PALEWIRE_DOCS_AWS_BUCKET }}
          base-path: first-django-admin
          dir: ./docs/
          should-cache: false
          use-accelerate-endpoint: false
          public: true
